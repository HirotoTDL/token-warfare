<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOKEN WARFARE(仮)</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app"></div>

  <div id="hud" class="hidden"></div>

  <div id="screen-title" class="screen">
    <div class="title-inner">
      <h1 class="logo">TOKEN <span>WARFARE</span></h1>
      <p class="tagline">分裂せよ。盤面を制し、敵将を撃ち抜け。</p>
      <button id="btn-start" class="btn-main">出撃する</button>
      <div class="controls-card">
        <h3>操作</h3>
        <table>
          <tr><td>WASD / Space / Shift</td><td>移動 / ジャンプ / スプリント</td></tr>
          <tr><td>マウス / 左クリック / 右クリック</td><td>視点 / 射撃 / エイム</td></tr>
          <tr><td>R(長押し)</td><td>エネルギーチャージ(無防備)</td></tr>
          <tr><td>E / 1〜4</td><td>スキル / トークン配備</td></tr>
        </table>
      </div>
      <p class="version">v0.2 — 3分マッチ・キャラ8人・エナジーコア</p>
    </div>
  </div>

  <div id="screen-mode" class="screen hidden">
    <h2 class="select-heading">モードを選択</h2>
    <div class="mode-buttons">
      <div class="mode-card" id="btn-versus">
        <h3>対戦モード</h3>
        <p>CPUの敵将と3分間の撃破数勝負(標準Lv6)</p>
      </div>
      <div class="mode-card practice">
        <h3>練習モード</h3>
        <p>レベルを選んで腕試し(Lv1=入門 〜 Lv10=鬼)</p>
        <div class="level-grid" id="level-grid"></div>
      </div>
    </div>
  </div>

  <div id="screen-select" class="screen hidden">
    <h2 class="select-heading">コマンダーを選択</h2>
    <div id="char-cards"></div>
  </div>

  <div id="screen-result" class="screen hidden">
    <div class="result-inner">
      <h1 id="result-label"></h1>
      <p id="result-score"></p>
      <p id="result-sub"></p>
      <div class="result-buttons">
        <button id="btn-rematch" class="btn-main">再戦</button>
        <button id="btn-reselect" class="btn-sub">キャラ選択へ</button>
        <button id="btn-remode" class="btn-sub">モード選択へ</button>
      </div>
    </div>
  </div>

  <div id="resume-overlay" class="hidden"><span>クリックで戦闘に戻る</span></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
